name: CI

# 我们自己的流水线。upstream 那 9 个 workflow 全绑在 master / workflow_dispatch 上,
# 我们的默认分支是 main,所以它们不会在这里误触发 —— 不用删,也不用改。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: jin-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.15.4
  NODE_VERSION: 24

jobs:
  # 「lint」在这个仓库里 = 一组策略脚本 + 品牌锚点校验。
  # Paperclip 没有 ESLint/Biome,我们也不加(会污染每个文件,让 upstream 合并变地狱)。
  policy:
    name: Policy & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # fetch-depth: 0 是必需的。默认浅克隆(depth=1)只有 PR head 那一个 commit,
      # 下面「禁止手改 lockfile」用的 `git diff base...head` 拿不到 base,会直接
      # fatal: Invalid symmetric difference expression → 每个 PR 都红。
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      # 这个 job 不装依赖(几个检查都是纯 node 脚本),所以也不要开 pnpm cache ——
      # 开了的话 post-job 存缓存时找不到 pnpm store,会直接把 job 判红。
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      # 这个门禁管的是「lockfile 必须是工具生成的」,不是「lockfile 不许变」。
      # 新增依赖/新增 workspace 包必然改 pnpm-lock.yaml —— 一律禁掉的话,
      # 任何加依赖的 PR 都永远绿不了(旧版就是这样,连它自己给的补救办法
      # `pnpm install --lockfile-only` 生成出来的 lock 也照样被它判红)。
      # 正确的不变量:用工具重新生成一遍,结果必须和提交的一模一样。
      # 手改过 → 重新生成会漂 → 红。工具生成的 → 零 diff → 绿。
      - name: lockfile 必须与 package.json 一致(禁止手改)
        if: github.event_name == 'pull_request'
        run: |
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}")"
          printf '%s\n' "$changed" | grep -qx 'pnpm-lock.yaml' || exit 0
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          pnpm install --lockfile-only --ignore-scripts
          if ! git diff --quiet -- pnpm-lock.yaml; then
            echo "::error::pnpm-lock.yaml 与 package.json 对不上(疑似手改或漏更新)。跑 pnpm install --lockfile-only 重新生成后提交。"
            git diff --stat -- pnpm-lock.yaml
            exit 1
          fi

      - name: Dockerfile deps stage 校验
        run: node ./scripts/check-docker-deps-stage.mjs

      - name: adapter/runtime 代码里不许出现 git push
        run: node ./scripts/check-no-git-push.mjs

      - name: 品牌锚点还在不在(upstream 改了 index.html 会在这里红)
        run: node ./scripts/jin/apply-brand.mjs --check

      # 手写迁移的 journal 门禁(JIN-72)。多个分支并行加迁移时,两条迁移会抢同一个 idx
      # (0150 真撞过一次),重复 idx 让迁移顺序变成未定义,而本地永远复现不出来。
      # 注意:这里刻意不跑 drizzle-kit generate —— snapshot 停在 0099,漂移会弹交互提示,CI 无 TTY 会卡死。
      - name: 迁移 _journal.json 一致性(重复 idx / 文件不一致 → 红)
        run: node ./.github/scripts/check-migration-journal.mjs

      # .github/scripts 是纯 node、零依赖的门禁脚本(PR 检查 + Branch Guard 的判定逻辑)。
      # 它们此前一个 CI job 都没挂 —— 守卫自己没人守。Branch Guard「删 main 必须报红」
      # 这条真告警,就靠 branch-guard-delete.test.mjs 钉住(JIN-64)。
      - name: .github/scripts 单测
        run: node --test '.github/scripts/tests/*.test.mjs'

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: 注入品牌(构建期,不进仓库)
        run: node ./scripts/jin/apply-brand.mjs
      - run: pnpm build

  # server 的测试被 vitest 钉死在 maxWorkers=1,单机跑很慢,只能靠分片摊到多个 runner。
  test:
    name: Test (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { group: general-server, label: "server 1/3", shard_index: 0, shard_count: 3 }
          - { group: general-server, label: "server 2/3", shard_index: 1, shard_count: 3 }
          - { group: general-server, label: "server 3/3", shard_index: 2, shard_count: 3 }
          - { group: general-workspaces-a, label: "workspaces-a" }
          - { group: general-workspaces-b, label: "workspaces-b" }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: 跑测试分组
        run: |
          if [ -n "${{ matrix.shard_count }}" ]; then
            pnpm test:run:general -- --group '${{ matrix.group }}' \
              --shard-index ${{ matrix.shard_index }} --shard-count ${{ matrix.shard_count }}
          else
            pnpm test:run:general -- --group '${{ matrix.group }}'
          fi

  test_serialized:
    name: Test serialized (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { shard_index: 0, shard_count: 2, label: "1/2" }
          - { shard_index: 1, shard_count: 2, label: "2/2" }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:run:serialized -- --shard-index ${{ matrix.shard_index }} --shard-count ${{ matrix.shard_count }}

  # 数据库迁移必须能在干净的 PG 上从零跑通 —— 这是我们最容易搞砸的地方(JIN-50 会加一堆表)。
  migrate:
    name: DB migrations (clean DB)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: paperclip
          POSTGRES_PASSWORD: paperclip
          POSTGRES_DB: paperclip
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U paperclip -d paperclip"
          --health-interval 2s --health-timeout 5s --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: 从零跑全部迁移
        env:
          DATABASE_URL: postgres://paperclip:paperclip@localhost:5432/paperclip
        run: pnpm db:migrate

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: 构建镜像(PR 不推,只验证能构建出来)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 单一必需检查:分支保护只要求这一个通过即可。
  ci:
    name: CI
    if: always()
    needs: [policy, typecheck, build, test, test_serialized, migrate, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 任一 lane 失败就红
        run: |
          results="${{ needs.policy.result }} ${{ needs.typecheck.result }} ${{ needs.build.result }} ${{ needs.test.result }} ${{ needs.test_serialized.result }} ${{ needs.migrate.result }} ${{ needs.docker.result }}"
          echo "lanes: $results"
          for r in $results; do
            [ "$r" = "success" ] || { echo "::error::有 lane 未通过($r)"; exit 1; }
          done
