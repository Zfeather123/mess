name: Branch Guard

# 主干兜底告警。
#
# 📌 仓库已转公开 —— **公开仓库的分支保护 / ruleset 是免费的**,那才是第一道防线
#    (禁止 force-push、禁止删除、CI 不绿不让合)。这个 workflow 是**第二道**:
#    真出事了要有人被吵醒,而不是靠某天有人偶然发现主干没了。
#
# 三层:
#   ① main 是**默认分支** —— GitHub 不允许删除默认分支(实测:422 Cannot delete the default branch)。
#      ⚠️ 推论:真正的风险不是"有人删了 main",而是"有人把默认分支切走了" —— 切走的那一刻它就变成可删的。
#   ② 每次 push main,把 sha 备份到 refs/tags/main-backup。分支真没了也能一行还原。
#   ③ 分支被删 / 每天定时:按「删掉之后有东西丢了吗」判,不按分支名前缀猜 ——
#      main / master / **当前默认分支**没了 → 判红并打印还原命令;
#      已合入 main 的分支没了 → 静默(合 PR 删源分支是正常流程,判红只会制造噪音);
#      未合入 / 查不到的 → 只 ::warning:: + 捞回 sha 的办法。判定见 .github/scripts/branch-guard-delete.mjs。
#
# 为什么不做"自动重建":自动把分支推回去,会跟一次**正当的**删除打架。宁可吵醒人,不要自作主张。
on:
  push:
    branches: [main]
  delete:
  schedule:
    - cron: "0 1 * * *" # 每天 09:00 (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    name: 备份 main 的 sha
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 更新 main-backup tag
        run: |
          git tag -f main-backup "${GITHUB_SHA}"
          git push -f origin refs/tags/main-backup
          echo "✅ main-backup → ${GITHUB_SHA}"

  deleted:
    name: 有分支被删了
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      # #28 已经止了血(feat/* / agent/* 不再判红)。这里接着把判据本身换掉:
      # 从「分支名前缀」换成「删掉之后有东西丢了吗」(JIN-64 的第 2 点)。
      # 前缀猜重要性有两个洞:① 一条**没合并**的 feat/* 被误删,和正常合并后删源分支
      # 一样只是 warning;② main|master 是写死的 —— 一旦有人**把默认分支切走**
      # (本文件开头第①层注释里点名的那个真风险),删掉新的默认分支会被当成
      # "非关键分支,忽略"。规则和取舍见 branch-guard-delete.mjs。
      - name: 删掉的这条分支,丢东西了吗
        env:
          REF: ${{ github.event.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/branch-guard-delete.mjs

  sanity:
    name: 主干还在吗
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 检查 main / master 存在,且 main 仍是默认分支
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          fail=0
          for b in main master; do
            if gh api "repos/${GITHUB_REPOSITORY}/branches/$b" --silent 2>/dev/null; then
              echo "✅ $b 存在"
            else
              echo "::error::分支 $b 不见了"; fail=1
            fi
          done
          default="$(gh api "repos/${GITHUB_REPOSITORY}" --jq .default_branch)"
          if [ "$default" != "main" ]; then
            # 默认分支被切走 = 上面第①层保护失效,main 变成可删的了
            echo "::error::默认分支是 '$default',不是 main —— main 的删除保护已失效,请切回去"; fail=1
          else
            echo "✅ 默认分支是 main(删除保护生效中)"
          fi
          exit $fail
